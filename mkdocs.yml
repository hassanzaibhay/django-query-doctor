site_name: django-query-doctor
site_url: https://hassanzaibhay.github.io/django-query-doctor
site_author: Hassan Zaib Hayat
site_description: >-
  Automated diagnosis and prescriptions for slow Django ORM queries.
  Detects N+1s, duplicates, missing indexes, and more — with exact
  file:line references and copy-paste code fixes.

repo_name: hassanzaibhay/django-query-doctor
repo_url: https://github.com/hassanzaibhay/django-query-doctor
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024-2026 Hassan Zaib Hayat

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: google
            merge_init_into_class: true
            show_if_no_docstring: false
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hassanzaibhay
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/django-query-doctor/

