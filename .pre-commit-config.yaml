# Pre-push checks — local convenience, not enforcement.
# `git push --no-verify` bypasses this; CI required status checks are the real gate.
# One-time setup: pre-commit install --hook-type pre-push
default_stages: [pre-push]
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check src/ tests/
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-format
        name: ruff format --check
        entry: ruff format --check src/ tests/
        language: system
        pass_filenames: false
        always_run: true
      - id: mypy
        name: mypy
        entry: mypy src/query_doctor/
        language: system
        pass_filenames: false
        always_run: true
      - id: pytest
        name: pytest
        entry: pytest -q
        language: system
        pass_filenames: false
        always_run: true
